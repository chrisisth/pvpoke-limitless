name: Update Fork

on:
#  schedule:
#    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  update-fork:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          repository: chrisisth/pvpoke-limitless
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "chrisisth"
          git config user.email "chris73757@gmail.com"
          
      - name: Setup Upstream
        run: git remote add upstream https://github.com/pvpoke/pvpoke.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Merge Upstream
        run: git merge upstream/master --strategy-option theirs --allow-unrelated-histories

      - name: Push Changes
        run: git push origin master

  trigger-deploy:
    needs: update-fork
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DeployFork Workflow
        run: gh workflow run DeployFork.yml --repo chrisisth/pvpoke-limitless
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
